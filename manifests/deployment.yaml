# Apply with environment-specific values:
#   FRONTEND_IMAGE=ghcr.io/openresilienceinitiative/oriso-frontend:<git-sha>
#   ORISO_APP_HOST=app.example.org
#   ORISO_APP_TLS_SECRET=app-example-org-tls
#   envsubst < manifests/deployment.yaml | kubectl apply -f -
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: caritas
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ${FRONTEND_IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "80"
            - name: LIVEKIT_TOKEN_SERVICE_URL
              value: "${LIVEKIT_TOKEN_SERVICE_URL}"
            - name: KEYCLOAK_REALM_URL
              value: "${KEYCLOAK_REALM_URL}"
            - name: USER_SERVICE_URL
              value: "${USER_SERVICE_URL}"
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: caritas
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 9001
      targetPort: http
      name: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: caritas
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ${ORISO_APP_HOST}
      secretName: ${ORISO_APP_TLS_SECRET}
  rules:
    - host: ${ORISO_APP_HOST}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 9001
