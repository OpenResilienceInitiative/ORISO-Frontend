# Temporary frontend deployment — substitute placeholders before apply:
#   ORISO_API_URL, ORISO_KEYCLOAK_REALM, ORISO_APP_TEMP_HOST, ORISO_APP_TEMP_TLS_SECRET
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-temp-runtime-config
  namespace: caritas
data:
  config.js: |
    window.__ORISO_RUNTIME_CONFIG__ = {
      REACT_APP_API_URL: "${ORISO_API_URL}",
      REACT_APP_KEYCLOAK_REALM: "${ORISO_KEYCLOAK_REALM}",
      REACT_APP_ELEMENT_URL: "${ORISO_ELEMENT_URL}",
      REACT_APP_COOKIE_DOMAIN: "${ORISO_COOKIE_DOMAIN}"
    };
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-temp
  namespace: caritas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-temp
  template:
    metadata:
      labels:
        app: frontend-temp
    spec:
      containers:
      - name: frontend-temp
        image: caritas-frontend-temp:latest
        imagePullPolicy: Never
        env:
        - name: LIVEKIT_TOKEN_SERVICE_URL
          value: "http://livekit-token-service.caritas.svc.cluster.local:3010"
        - name: KEYCLOAK_REALM_URL
          value: "http://oriso-platform-keycloak.caritas.svc.cluster.local:8080/realms/online-beratung"
        - name: USER_SERVICE_URL
          value: "http://oriso-platform-userservice.caritas.svc.cluster.local:8082"
        ports:
        - containerPort: 80
        volumeMounts:
        - name: runtime-config
          mountPath: /usr/share/nginx/html/config.js
          subPath: config.js
          readOnly: true
      volumes:
      - name: runtime-config
        configMap:
          name: frontend-temp-runtime-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-temp
  namespace: caritas
spec:
  selector:
    app: frontend-temp
  ports:
  - port: 9001
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-temp-ingress
  namespace: caritas
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/redirect-to-https: "true"
spec:
  ingressClassName: traefik
  rules:
  - host: ${ORISO_APP_TEMP_HOST}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-temp
            port:
              number: 9001
  tls:
  - hosts:
    - ${ORISO_APP_TEMP_HOST}
    secretName: ${ORISO_APP_TEMP_TLS_SECRET}
