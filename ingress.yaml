# Apply with environment-specific values, e.g.:
#   ORISO_APP_HOST=app.example.org envsubst < ingress.yaml | kubectl apply -f -
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: caritas
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - ${ORISO_APP_HOST}
    secretName: ${ORISO_APP_TLS_SECRET}
  rules:
  - host: ${ORISO_APP_HOST}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 9001
