name: Reusable Node Build steps

inputs:
  node_version:
    required: true
    type: string

runs:
  using: 'composite'
  steps:
  - name: Set up Node.js
    uses: actions/setup-node@v4
    with:
      node-version: ${{ inputs.node_version }}
      cache: npm

  - name: Install dependencies
    shell: bash
    run: npm ci --ignore-scripts --legacy-peer-deps

  - name: Build app
    shell: bash
    run: CI=false npm run build
