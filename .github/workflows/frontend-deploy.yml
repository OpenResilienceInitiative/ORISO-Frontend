name: "ORISO Frontend Deploy"

run-name: >
  ${{ github.event_name == 'workflow_dispatch'
      && format('Deploy Frontend to {0} ({1})', github.event.inputs.environment, github.event.inputs.image_tag)
      || format('Deploy Frontend to dev') }}

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Target environment
        required: true
        default: dev
        options:
          - dev
          - prod
      image_tag:
        type: string
        description: GHCR image tag (git SHA, dev, or main)
        required: true
        default: dev

env:
  REGISTRY: ghcr.io
  ORG: openresilienceinitiative
  IMAGE_NAME: oriso-frontend

jobs:
  deploy-dev:
    if: ${{ github.event.inputs.environment == 'dev' }}
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Deploy to development cluster
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            export KUBECONFIG="$HOME/.kube/config"
            export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}"
            REPO_DIR="${ORISO_FRONTEND_DIR:-$HOME/ORISO-Frontend}"
            cd "$REPO_DIR"
            git fetch origin dev
            git checkout dev
            git pull --ff-only origin dev
            bash scripts/deploy-frontend.sh

  deploy-prod:
    if: ${{ github.event.inputs.environment == 'prod' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to production cluster
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            export KUBECONFIG="$HOME/.kube/config"
            export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}"
            REPO_DIR="${ORISO_FRONTEND_DIR:-$HOME/ORISO-Frontend}"
            cd "$REPO_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            bash scripts/deploy-frontend.sh
