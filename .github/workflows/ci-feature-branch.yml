name: CI - Feature Branch

on:
  push:
    branches-ignore:
    - main
    - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Build frontend application
      uses: ./.github/actions/node-build
      with:
        node_version: '18'

    - name: Run unit tests
      shell: bash
      run: npm run test:unit
