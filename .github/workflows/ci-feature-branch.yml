name: CI - Feature Branch

on:
  push:
    branches-ignore:
    - main
    paths-ignore:
    - '.storybook/**'
    - '.storybook-backup/**'
    - '**/*.stories.*'
    - 'storybook-*'
    - 'Dockerfile.storybook'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Build frontend application
      uses: ./.github/actions/node-build
      with:
        node_version: '18'
