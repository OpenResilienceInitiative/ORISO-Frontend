# Apply with environment-specific values, e.g.:
#   ORISO_APP_V2_HOST=appv2.example.org ORISO_APP_V2_TLS_SECRET=appv2-example-org-tls envsubst < ingress-v2.yaml | kubectl apply -f -
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-v2-ingress
  namespace: caritas
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - ${ORISO_APP_V2_HOST}
    secretName: ${ORISO_APP_V2_TLS_SECRET}
  rules:
  - host: ${ORISO_APP_V2_HOST}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-v2
            port:
              number: 9002
